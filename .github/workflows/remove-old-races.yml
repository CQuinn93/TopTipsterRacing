# Remove race data older than 5 days. Runs Sunday 18:00 UTC (and manually).
# Secrets: SUPABASE_URL, SUPABASE_SERVICE_KEY
name: Remove old races

on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  remove-old:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Remove races older than 5 days
        run: npx tsx scripts/remove-old-races.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

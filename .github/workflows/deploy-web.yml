# Build and deploy the web app to GitHub Pages.
# Requires: Repository secrets SUPABASE_URL and SUPABASE_ANON_KEY (anon/public key, not service key).
# In repo Settings → Pages, set Source to "GitHub Actions".
name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-web.yml'
      - 'app/**'
      - 'lib/**'
      - 'components/**'
      - 'contexts/**'
      - 'constants/**'
      - 'assets/**'
      - 'app.json'
      - 'package.json'
      - 'package-lock.json'
      - 'babel.config.js'
      - 'metro.config.js'
      - 'global.css'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build web
        run: npm run build:web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Add .nojekyll (required so _expo folder is served)
        run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4

# Pull following day's race data. Triggered by cron-job.org at 17:00 and 18:00 UTC (5pm/6pm UK GMT, 6pm/7pm BST).
# Competitions for the following day must be created before 8pm UK to get races that night.
# GitHub Secrets: SUPABASE_URL, SUPABASE_SERVICE_KEY, RAPIDAPI_KEY_PULL_RACES. Optional: RESEND_API_KEY, PULL_RACES_NOTIFICATION_EMAIL for email report.
name: Pull races

on:
  workflow_dispatch:

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Pull races (following day)
        run: npx tsx scripts/pull-races.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RAPIDAPI_KEY_PULL_RACES: ${{ secrets.RAPIDAPI_KEY_PULL_RACES }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PULL_RACES_NOTIFICATION_EMAIL: ${{ secrets.PULL_RACES_NOTIFICATION_EMAIL }}

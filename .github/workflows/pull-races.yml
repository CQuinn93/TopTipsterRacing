# Pull following day's race data. Runs at 5PM UTC (and manually).
# GitHub Secrets: SUPABASE_URL, SUPABASE_SERVICE_KEY, RAPIDAPI_KEY_PULL_RACES
name: Pull races

on:
  schedule:
    - cron: '15,45 15-20 * * *'
  workflow_dispatch:

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Pull races (following day)
        run: npx tsx scripts/pull-races.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RAPIDAPI_KEY_PULL_RACES: ${{ secrets.RAPIDAPI_KEY_PULL_RACES }}

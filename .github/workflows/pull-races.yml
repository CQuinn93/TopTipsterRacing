# Pull following day's race data. Runs at 3pm, 6pm and 9pm UK time (and manually).
# Cron is UTC only: 15:00, 18:00, 21:00 UTC = 3pm, 6pm, 9pm GMT (winter); 4pm, 7pm, 10pm BST (summer).
# Competitions for the following day must be created before 8pm UK to get races that night.
# GitHub Secrets: SUPABASE_URL, SUPABASE_SERVICE_KEY, RAPIDAPI_KEY_PULL_RACES. Optional: RESEND_API_KEY, PULL_RACES_NOTIFICATION_EMAIL for email report.
name: Pull races

on:
  schedule:
    - cron: '0 15,18,21 * * *'
  workflow_dispatch:

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Pull races (following day)
        run: npx tsx scripts/pull-races.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RAPIDAPI_KEY_PULL_RACES: ${{ secrets.RAPIDAPI_KEY_PULL_RACES }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PULL_RACES_NOTIFICATION_EMAIL: ${{ secrets.PULL_RACES_NOTIFICATION_EMAIL }}

# Update race results. Triggered by cron-job.org every 10 min (e.g. 12:00–19:59 UTC).
# GitHub Secrets: SUPABASE_URL, SUPABASE_SERVICE_KEY, RAPIDAPI_KEY_UPDATE_RESULTS.
# Optional: RESEND_API_KEY, UPDATE_RESULTS_NOTIFICATION_EMAIL for email report (API call count, races updated).
name: Update race results

on:
  workflow_dispatch:

jobs:
  results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Update race results
        run: npx tsx scripts/update-race-results.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RAPIDAPI_KEY_UPDATE_RESULTS: ${{ secrets.RAPIDAPI_KEY_UPDATE_RESULTS }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          UPDATE_RESULTS_NOTIFICATION_EMAIL: ${{ secrets.UPDATE_RESULTS_NOTIFICATION_EMAIL }}
